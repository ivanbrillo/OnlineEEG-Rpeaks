<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OnlineEEG{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="nav-brand">OnlineEEG</div>
    <ul>
        <li><a href="{{ url_for('index') }}"    {% if request.endpoint == 'index'     %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ url_for('upload') }}"   {% if request.endpoint == 'upload'    %}class="active"{% endif %}>Upload</a></li>
        <li><a href="{{ url_for('inference') }}" {% if request.endpoint == 'inference' %}class="active"{% endif %}>Inference &amp; Results</a></li>
        <li>
            <form action="{{ url_for('reset') }}" method="post" style="display:inline"
                  onsubmit="return confirm('Reset all training data? This cannot be undone.')">
                <button type="submit" class="nav-link nav-reset">Reset Dataset</button>
            </form>
        </li>
    </ul>
</nav>

<main class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</main>

</body>
</html>
